<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn about align items</title>


    <style>
        .parent{
            width: 600px;
            height: 400px;
            border: 3px solid;
            display: flex;
            align-items: end;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            flex-direction: column;
        }
        .div1,.div2,.div3 {
            width: 100px;
            height: 100px;
            border: 2px solid;
        }

        .div1 {
            background:linear-gradient(red,blue,black,yellow);
        }
        
        .div2 {
            background:radial-gradient(red,black,yellow);
        }

        .div3 {
            background:linear-gradient(blue,pink);
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="div1"></div>
        <div class="div2"></div>
        <div class="div3"></div>
    </div>

</body>

</html>
