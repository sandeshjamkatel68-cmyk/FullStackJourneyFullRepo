<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="full-calculator">
        <div class="display-screen">
            <input type="text" id="display" disabled>
        </div>

        <button class="btn"onclick="Calculate('ac')">AC</button>
        <button class="btn" onclick="Calculate('del')">DEL</button>
        <button class="btn" onclick="Calculate('mod')">%</button>
        <button class="btn" onclick="Calculate('div')">/</button>
        <button class="btn">7</button>
        <button class="btn">8</button>
        <button class="btn">9</button>
        <button class="btn" id="div-btn" onclick="Calculate('mul')">*</button>
        <button class="btn">4</button>
        <button class="btn">5</button>
        <button class="btn">6</button>
        <button class="btn" id="div-btn" onclick="Calculate('sub')">-</button>
        <button class="btn">1</button>
        <button class="btn">2</button>
        <button class="btn">3</button>
        <button class="btn" id="div-btn" onclick="Calculate('add')">+</button>
        <button class="btn">0</button>
        <button class="btn">00</button>
        <button class="btn">.</button>
        <button class="btn" id="div-btn" onclick="Calculate('total')">=</button>

    </div>
    <script src="script.js"></script>
</body>
</html>
